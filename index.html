<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pagina de Cadastro</title>
</head>
<body>
    <h1>Página de Cadastro</h1>
    <div id="formulario">
<p>Nome</p>
    <input type="text" class="caixa" id="nome">
<p>Usuário</p>
    <input type="text" class="caixa" id="usuario">
<p>Email</p>
    <input type="email" class="caixa" id="email">
<p>Senha</p>
    <input type="password" class="caixa" id="senha">
    <input type="button" name="" id="mostrar-senha" value="🙈" onclick="showpassword()">
    <input type="button" value="Cadastrar" id="botao-cadastro" onclick="cadastrar()">
</div>

</body>
<script src="script.js"></script>
</html>
